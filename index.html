<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xeno eSport</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:radial-gradient(circle at center,#2b0050,#0a0014 80%);
color:white;
overflow-x:hidden;
}

#galaxy{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
}

header h1{
color:#8a2be2;
}

/* HERO */
.hero{
height:40vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.glitch{
font-size:40px;
animation:glitch 1.5s infinite;
}

@keyframes glitch{
0%{text-shadow:2px 2px #8a2be2,-2px -2px #ff00ff;}
50%{text-shadow:-2px 2px #8a2be2,2px -2px #ff00ff;}
100%{text-shadow:2px -2px #8a2be2,-2px 2px #ff00ff;}
}

/* SYSTEM */
.system{text-align:center;padding:20px;}

input{
padding:12px;
border:none;
border-radius:10px;
margin:5px;
width:220px;
text-align:center;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{transform:scale(1.1);}

.present{background:#00ff88;}
.absent{background:#ff0033;color:white;}
.admin{background:gold;color:black;display:none;}

.lists{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
flex-wrap:wrap;
}

.list-box{
background:#111;
padding:15px;
border-radius:10px;
min-width:200px;
border:1px solid #8a2be244;
}

.list-box h3{color:#8a2be2;}

ul{list-style:none;}

/* TOURNOI */
#tournamentForm{display:none;margin-top:15px;}

.tournament{
background:#111;
padding:15px;
border-radius:10px;
margin:20px auto;
width:320px;
border:1px solid #8a2be244;
}

</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<header>
<h1>Xeno eSport</h1>
</header>

<section class="hero">
<h2 class="glitch">Xeno eSport</h2>
<p>Gestion team & tournoi</p>
</section>

<section id="tournamentDisplay"></section>

<section class="system">

<input type="text" id="pseudo" placeholder="Entre ton pseudo">

<div>
<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>
</div>

<div>
<button onclick="loginAdmin()">Connexion Admin</button>
</div>

<div>
<button id="createBtn" class="admin" onclick="toggleForm()">Créer tournoi</button>
<button id="deleteBtn" class="admin" onclick="deleteTournament()">Supprimer tournoi</button>
</div>

<div id="tournamentForm">
<h3>Créer un tournoi</h3>

<input type="text" id="tourName" placeholder="Nom"><br>
<input type="date" id="tourDate"><br>
<input type="time" id="tourTime"><br>
<input type="text" id="tourGame" placeholder="Jeu"><br>
<input type="number" id="tourPlayers" placeholder="Joueurs max"><br>

<button onclick="saveTournament()">Valider</button>
</div>

<div class="lists">
<div class="list-box">
<h3>🟢 Présents</h3>
<ul id="presentList"></ul>
</div>

<div class="list-box">
<h3>🔴 Absents</h3>
<ul id="absentList"></ul>
</div>
</div>

</section>

<script>

// ===== GALAXIE =====
const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

let stars = [];
let w,h;

function init(){
w = window.innerWidth;
h = window.innerHeight;

canvas.width = w;
canvas.height = h;

stars=[];
for(let i=0;i<800;i++){
stars.push({
x:Math.random()*w,
y:Math.random()*h,
size:Math.random()*1.5,
speed:Math.random()*0.5
});
}
}

window.addEventListener("resize",init);
init();

function animate(){
ctx.fillStyle="rgba(10,0,20,0.6)";
ctx.fillRect(0,0,w,h);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

s.y+=s.speed;

if(s.y>h){
s.y=0;
s.x=Math.random()*w;
}
});

requestAnimationFrame(animate);
}
animate();

// ===== ADMIN =====
const PASSWORD="Antoninfaure28&";

function loginAdmin(){
let pass=prompt("Mot de passe admin :");

if(pass===PASSWORD){
alert("Admin activé 🔥");
document.querySelectorAll(".admin").forEach(b=>b.style.display="inline-block");
}else{
alert("Erreur ❌");
}
}

// ===== DATA =====
let present=JSON.parse(localStorage.getItem("present"))||[];
let absent=JSON.parse(localStorage.getItem("absent"))||[];
let tournament=JSON.parse(localStorage.getItem("tournament"))||null;

function saveAll(){
localStorage.setItem("present",JSON.stringify(present));
localStorage.setItem("absent",JSON.stringify(absent));
localStorage.setItem("tournament",JSON.stringify(tournament));
}

// ===== PRESENCE =====
function setPresence(isPresent){
let pseudo=document.getElementById("pseudo").value.trim();

if(!pseudo){alert("Entre un pseudo");return;}

present=present.filter(p=>p!==pseudo);
absent=absent.filter(p=>p!==pseudo);

if(isPresent){present.push(pseudo);}else{absent.push(pseudo);}

saveAll();
renderLists();
}

// ===== LISTES =====
function renderLists(){
let pList=document.getElementById("presentList");
let aList=document.getElementById("absentList");

pList.innerHTML="";
aList.innerHTML="";

present.forEach(p=>{
let li=document.createElement("li");
li.textContent=p;
pList.appendChild(li);
});

absent.forEach(p=>{
let li=document.createElement("li");
li.textContent=p;
aList.appendChild(li);
});

renderTournament();
}

// ===== TOURNOI =====
function toggleForm(){
let f=document.getElementById("tournamentForm");
f.style.display=(f.style.display==="none")?"block":"none";
}

function saveTournament(){

let name=document.getElementById("tourName").value;
let date=document.getElementById("tourDate").value;
let time=document.getElementById("tourTime").value;
let game=document.getElementById("tourGame").value;
let players=document.getElementById("tourPlayers").value;

if(!name||!date||!time||!game||!players){
alert("Remplis tout !");
return;
}

tournament={name,date,time,game,players};

saveAll();
renderLists();
toggleForm();
}

function renderTournament(){
let display=document.getElementById("tournamentDisplay");
display.innerHTML="";

if(tournament){
display.innerHTML=`
<div class="tournament">
<h2>🏆 ${tournament.name}</h2>
<p>📅 ${tournament.date}</p>
<p>⏰ ${tournament.time}</p>
<p>🎮 ${tournament.game}</p>
<p>👥 ${tournament.players} joueurs / équipe</p>
</div>
`;
}
}

function deleteTournament(){
if(confirm("Supprimer ?")){
tournament=null;
saveAll();
renderLists();
}
}

// ===== INIT =====
window.onload=function(){
renderLists();
}

</script>

</body>
</html>
