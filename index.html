<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSK Esport</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */

.bg{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 20%, rgba(255,0,0,0.2), transparent 40%),
             radial-gradient(circle at 80% 80%, rgba(255,255,255,0.08), transparent 40%),
             linear-gradient(135deg,#000,#111,#200000);
  z-index:-10;
}

/* SMOKE */

.smoke span{
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
  filter:blur(90px);
  border-radius:50%;
  animation:move 18s infinite alternate;
  z-index:-9;
}

.smoke span:nth-child(1){top:-200px;left:-200px;}
.smoke span:nth-child(2){bottom:-200px;right:-200px;}

@keyframes move{
  0%{transform:translate(0,0);}
  100%{transform:translate(120px,80px);}
}

/* HERO */

.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.title{
  font-size:60px;
  color:#ff1e1e;
}

/* BUTTON */

.btn{
  display:inline-block;
  padding:15px 25px;
  margin:10px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.red{background:#ff1e1e;color:white;}
.white{background:white;color:black;}

/* FORM */

input,textarea,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:15px;
  background:#ff1e1e;
  border:none;
  color:white;
  cursor:pointer;
}

section{
  padding:80px 20px;
  text-align:center;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="smoke">
  <span></span>
  <span></span>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <div class="title">NSK ESPORT</div>

    <a class="btn red" href="https://discord.gg/hc8jRWGfsU" target="_blank">Discord</a>
    <a class="btn white" href="#form">Recrutement</a>
  </div>
</div>

<!-- FORM -->
<section id="form">

<h2>Recrutement</h2>

<input id="prenom" placeholder="Prénom">
<input id="nom" placeholder="Nom">
<input id="email" placeholder="Email">
<input id="age" placeholder="Âge">
<input id="jeu" placeholder="Jeu">
<textarea id="motivation" placeholder="Motivation"></textarea>

<button onclick="send()">Envoyer</button>

</section>

<script>

function send(){

  const webhook = "https://discord.com/api/webhooks/1506483965413032107/k1KphgLv_5pKCzHgfcS82pTZb_V40XuLT6BqN6eInsf4kWGcQfcyy00uJ0DDMsR5kGWo";

  const prenom = document.getElementById("prenom").value;
  const nom = document.getElementById("nom").value;
  const email = document.getElementById("email").value;
  const age = document.getElementById("age").value;
  const jeu = document.getElementById("jeu").value;
  const motivation = document.getElementById("motivation").value;

  if(!prenom || !nom || !email || !age || !jeu || !motivation){
    alert("Remplis tout !");
    return;
  }

  fetch(webhook,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      content:`📩 NSK CANDIDATURE

👤 ${prenom} ${nom}
📧 ${email}
🎂 ${age}
🎮 ${jeu}
💬 ${motivation}`
    })
  });

  alert("Envoyé !");
}

</script>

</body>
</html>
