<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM TOXIC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#000;color:white;overflow-x:hidden;}
body::before{content:"";position:fixed;width:200%;height:200%;top:-50%;left:-50%;background:radial-gradient(circle at 30% 30%, rgba(0,255,120,0.15), transparent 40%),radial-gradient(circle at 70% 60%, rgba(0,255,100,0.12), transparent 40%),radial-gradient(circle at 50% 80%, rgba(0,255,80,0.1), transparent 40%);animation:liquid 12s infinite linear;z-index:-1;filter:blur(60px);}
@keyframes liquid{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(1.2);}100%{transform:rotate(360deg) scale(1);}}
.hero{height:40vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.glitch{font-size:40px;color:#00ff88;text-shadow:0 0 10px #00ff88,0 0 25px #00ff88;white-space: nowrap;}
.system{text-align:center;padding:20px;}
input{padding:12px;border:none;border-radius:10px;margin:8px;width:220px;text-align:center;}
button{padding:12px 20px;margin:8px;border:none;border-radius:10px;cursor:pointer;font-size:14px;transition:0.3s;}
.present{background:#00ff88;}
.absent{background:#ff0033;color:white;}
.admin{background:gold;color:black;display:none;}
.login-btn{background:#00cc66;color:black;font-weight:bold;}
.logout{background:#ff0033;color:white;display:none;}
button:hover{transform:scale(1.1);}
.lists{display:flex;justify-content:center;gap:40px;margin-top:20px;flex-wrap:wrap;}
.list-box{background:#111;padding:15px;border-radius:10px;min-width:200px;border:1px solid #00ff8850;}
#tournamentDisplay{margin-top:20px;}
#popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;}
.popup-box{background:#111;padding:30px;border-radius:15px;text-align:center;box-shadow:0 0 20px #00ff88;}
</style>
</head>
<body>

<section class="hero">
<h1 class="glitch">☣️ TEAM TOXIC ☣️</h1>
<p>Système de présence team</p>
</section>

<section class="system">
<input type="text" id="pseudo" placeholder="Entre ton pseudo">

<div>
<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>
</div>

<button class="login-btn" onclick="openPopup()">Connexion Admin / Dev</button>
<button class="logout" onclick="logout()">Se déconnecter</button>

<div>
<button class="admin" onclick="createTournament()">Créer tournoi</button>
<button class="admin" onclick="editTournament()">Modifier tournoi</button>
<button class="admin" onclick="deleteTournament()">Supprimer tournoi</button>
<button class="admin" onclick="removePlayer()">Supprimer joueur</button>
<button class="admin" onclick="resetPresence()">Réinitialiser toutes les présences/absences</button>
</div>

<div id="tournamentDisplay"></div>

<div class="lists">
<div class="list-box">
<h3 id="presentTitle">🟢 Présents (0)</h3>
<ul id="presentList"></ul>
</div>

<div class="list-box">
<h3 id="absentTitle">🔴 Absents (0)</h3>
<ul id="absentList"></ul>
</div>
</div>
</section>

<div id="popup">
<div class="popup-box">
<h3>Connexion Admin / Dev</h3>
<input type="email" id="email" placeholder="Adresse mail"><br>
<input type="password" id="password" placeholder="Mot de passe"><br>
<button onclick="login()">Valider</button><br>
<button onclick="closePopup()">Fermer</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyBdLM-v9HlqIj2v7k1Z7idphIPyVK3GLlk",
authDomain:"xeno-esport.firebaseapp.com",
projectId:"xeno-esport",
storageBucket:"xeno-esport.firebasestorage.app",
messagingSenderId:"870029280667",
appId:"1:870029280667:web:50a4af541bb484af79cd3e"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

const ADMINS=[
"jules.carton1@icloud.com",
"corbanidonpierre3@gmail.com",
"delavalkeke@gmail.com"
];

const DEVS=[
"faureantonin744@gmail.com"
];

const WEBHOOK="https://discord.com/api/webhooks/1485952876374130872/r7x32yNQKqbNs-p7nLj7kEOgPhhd_RsAB8UQvVaE2OT_yS8Wl1JV0__V2GHYPSUU7btS";
const SITE="https://toxic-esport-app.netlify.app/";

let present={},absent={},tournament=null,isAdmin=false;

function sanitizePseudo(p){return p.replace(/[.#$[\]]/g,"_");}

function render(){
document.getElementById("presentList").innerHTML=Object.values(present).map(p=>`<li>${p.name}</li>`).join("");
document.getElementById("absentList").innerHTML=Object.values(absent).map(p=>`<li>${p.name}</li>`).join("");
document.getElementById("presentTitle").textContent=`🟢 Présents (${Object.keys(present).length})`;
document.getElementById("absentTitle").textContent=`🔴 Absents (${Object.keys(absent).length})`;
document.getElementById("tournamentDisplay").innerHTML=tournament?`<h3>🏆 ${tournament.name}</h3><p>📅 ${tournament.date} - ⏰ ${tournament.time}</p><p>👥 Max/équipe : ${tournament.max}</p>`:"";
}

async function setPresence(isPresent){
const pseudo=document.getElementById("pseudo").value.trim();
if(!pseudo){alert("Entre ton pseudo !");return;}
const key=sanitizePseudo(pseudo);
const target=isPresent?"present":"absent";
const other=isPresent?"absent":"present";
await setDoc(doc(db,target,key),{name:pseudo});
await deleteDoc(doc(db,other,key));
document.getElementById("pseudo").value="";
}

async function login(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
try{
await signInWithEmailAndPassword(auth,email,password);
if(ADMINS.includes(email)||DEVS.includes(email)){
isAdmin=true;
updateAdminUI();
closePopup();
alert("Connexion réussie");
}else{
alert("Vous n'avez pas la permission");
}
}catch(e){alert("Erreur de connexion");}
}

function logout(){
signOut(auth);
isAdmin=false;
updateAdminUI();
alert("Déconnecté");
}

function updateAdminUI(){
document.querySelectorAll(".admin").forEach(b=>b.style.display=isAdmin?"inline-block":"none");
document.querySelector(".logout").style.display=isAdmin?"inline-block":"none";
}

function openPopup(){document.getElementById("popup").style.display="flex";}
function closePopup(){document.getElementById("popup").style.display="none";}

async function createTournament(){
const name=prompt("Nom du tournoi ?");
const date=prompt("Date ?");
const time=prompt("Heure ?");
const max=prompt("Nombre de joueurs max par équipe ?");
if(!name)return;
tournament={name,date,time,max};
await setDoc(doc(db,"tournament","info"),tournament);
sendDiscord("🏆 Nouveau tournoi",`Nom : **${name}**\n📅 ${date}\n⏰ ${time}\n👥 Max/équipe : ${max}\n\n🔗 ${SITE}`);
}

async function editTournament(){
if(!tournament){alert("Aucun tournoi");return;}
const name=prompt("Nom",tournament.name);
const date=prompt("Date",tournament.date);
const time=prompt("Heure",tournament.time);
const max=prompt("Max",tournament.max);
tournament={name,date,time,max};
await setDoc(doc(db,"tournament","info"),tournament);
sendDiscord("✏️ Tournoi modifié",`Nom : **${name}**\n📅 ${date}\n⏰ ${time}\n👥 Max : ${max}\n\n🔗 ${SITE}`);
}

async function deleteTournament(){
if(confirm("Supprimer tournoi ?")){
tournament=null;
await deleteDoc(doc(db,"tournament","info"));
sendDiscord("❌ Tournoi supprimé",`Le tournoi a été supprimé\n\n🔗 ${SITE}`);
}
}

async function removePlayer(){
let name=prompt("Pseudo à supprimer ?");
if(!name)return;
let key=sanitizePseudo(name);
await deleteDoc(doc(db,"present",key));
await deleteDoc(doc(db,"absent",key));
}

async function resetPresence(){
if(confirm("Réinitialiser toutes les présences ?")){
const pSnap=await getDocs(collection(db,"present"));
pSnap.forEach(d=>deleteDoc(doc(db,"present",d.id)));
const aSnap=await getDocs(collection(db,"absent"));
aSnap.forEach(d=>deleteDoc(doc(db,"absent",d.id)));
}
}

function sendDiscord(title,desc){
fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:"@everyone",embeds:[{title:title,description:desc,color:65280}]})});
}

onSnapshot(collection(db,"present"),snap=>{present={};snap.forEach(d=>present[d.id]=d.data());render();});
onSnapshot(collection(db,"absent"),snap=>{absent={};snap.forEach(d=>absent[d.id]=d.data());render();});
onSnapshot(doc(db,"tournament","info"),snap=>{tournament=snap.exists()?snap.data():null;render();});

window.setPresence=setPresence;
window.login=login;
window.logout=logout;
window.openPopup=openPopup;
window.closePopup=closePopup;
window.createTournament=createTournament;
window.editTournament=editTournament;
window.deleteTournament=deleteTournament;
window.removePlayer=removePlayer;
window.resetPresence=resetPresence;
</script>

</body>
</html>
