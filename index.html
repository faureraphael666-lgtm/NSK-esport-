<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TEAM TOXIC</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

h1{
color:#22c55e;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.member{
background:#22c55e;
color:white;
}

.admin{
background:#ef4444;
color:white;
}

.dev{
background:#8b5cf6;
color:white;
}

.hidden{
display:none;
}

input{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

#playerList{
margin-top:20px;
}

</style>
</head>

<body>

<h1>TEAM TOXIC</h1>

<h2>Présence</h2>

<input id="pseudo" placeholder="Ton pseudo">

<br>

<button class="member" onclick="present()">Présent</button>
<button class="member" onclick="absent()">Absent</button>

<div id="playerList"></div>

<hr>

<h2>Administration</h2>

<button onclick="showLogin('admin')">Connexion Admin</button>
<button onclick="showLogin('dev')">Connexion Développeur</button>

<div id="loginBox" class="hidden">

<input id="email" placeholder="Adresse mail">
<input id="password" type="password" placeholder="Mot de passe">

<br>

<button onclick="login()">Se connecter</button>

</div>

<div id="adminPanel" class="hidden">

<h2>Panel Admin / Développeur</h2>

<button class="admin">Créer tournoi</button>
<button class="admin">Modifier tournoi</button>
<button class="admin">Supprimer tournoi</button>
<button class="admin">Supprimer joueur</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyBdLM-v9HlqIj2v7k1Z7idphIPyVK3GLlk",
authDomain: "xeno-esport.firebaseapp.com",
projectId: "xeno-esport",
storageBucket: "xeno-esport.firebasestorage.app",
messagingSenderId: "870029280667",
appId: "1:870029280667:web:50a4af541bb484af79cd3e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let loginType="";

window.showLogin=function(type){

loginType=type;

document.getElementById("loginBox").classList.remove("hidden");

}

window.login=async function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

const admins=[
"jules.carton1@icloud.com",
"corbanidonpierre3@gmail.com",
"delavalkeke@gmail.com"
];

const devs=[
"faureantonin744@gmail.com"
];

if(loginType==="admin" && admins.includes(email)){

document.getElementById("adminPanel").classList.remove("hidden");
alert("Connexion Admin réussie");

}

else if(loginType==="dev" && devs.includes(email)){

document.getElementById("adminPanel").classList.remove("hidden");
alert("Connexion Développeur réussie");

}

else{

alert("Vous n'avez pas la permission");

}

}

catch(error){

alert("Erreur de connexion");

}

}

window.present=async function(){

const pseudo=document.getElementById("pseudo").value;

if(!pseudo) return;

await addDoc(collection(db,"presence"),{
pseudo:pseudo,
status:"present"
});

loadPlayers();

}

window.absent=async function(){

const pseudo=document.getElementById("pseudo").value;

if(!pseudo) return;

await addDoc(collection(db,"presence"),{
pseudo:pseudo,
status:"absent"
});

loadPlayers();

}

async function loadPlayers(){

const querySnapshot=await getDocs(collection(db,"presence"));

let html="";

querySnapshot.forEach((doc)=>{

const data=doc.data();

html+=data.pseudo+" : "+data.status+"<br>";

});

document.getElementById("playerList").innerHTML=html;

}

loadPlayers();

</script>

</body>
</html>
