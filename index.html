<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Xeno eSport</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
background:radial-gradient(circle,#2b0050,#0a0014);
color:white;
overflow-x:hidden;
}

/* GALAXIE */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HEADER */
header{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

h1{color:#8a2be2;}

/* HERO */
.hero{
text-align:center;
margin-top:20px;
}

.glitch{
font-size:40px;
animation:glitch 1.5s infinite;
}

@keyframes glitch{
0%{text-shadow:2px 2px #8a2be2,-2px -2px #ff00ff;}
50%{text-shadow:-2px 2px #8a2be2,2px -2px #ff00ff;}
100%{text-shadow:2px -2px #8a2be2,-2px 2px #ff00ff;}
}

/* SYSTEM */
.system{text-align:center;padding:20px;}

input{
padding:12px;
border:none;
border-radius:10px;
margin:5px;
width:220px;
text-align:center;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{transform:scale(1.1);}

.present{background:#00ff88;}
.absent{background:#ff0033;color:white;}
.admin{background:gold;color:black;display:none;}

.lists{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
flex-wrap:wrap;
}

.list-box{
background:#111;
padding:15px;
border-radius:10px;
min-width:200px;
border:1px solid #8a2be244;
}

.list-box h3{color:#8a2be2;}

ul{list-style:none;}

.tournament{
background:#111;
padding:15px;
border-radius:10px;
margin:20px auto;
width:320px;
border:1px solid #8a2be244;
}

#tournamentForm{display:none;margin-top:10px;}

</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<header>
<h1>Xeno eSport</h1>
</header>

<section class="hero">
<h2 class="glitch">Xeno eSport</h2>
<p>Gestion team & tournoi</p>
</section>

<section id="tournamentDisplay"></section>

<section class="system">

<input id="pseudo" placeholder="Pseudo">

<div>
<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>
</div>

<button onclick="loginAdmin()">Connexion Admin</button>

<div>
<button class="admin" onclick="toggleForm()">Créer tournoi</button>
</div>

<div id="tournamentForm">
<input id="tourName" placeholder="Nom"><br>
<input id="tourDate" type="date"><br>
<input id="tourTime" type="time"><br>
<input id="tourGame" placeholder="Jeu"><br>
<input id="tourPlayers" placeholder="Joueurs max"><br>
<button onclick="saveTournament()">Valider</button>
</div>

<div class="lists">
<div class="list-box">
<h3>🟢 Présents</h3>
<ul id="presentList"></ul>
</div>

<div class="list-box">
<h3>🔴 Absents</h3>
<ul id="absentList"></ul>
</div>
</div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdLM-v9HlqIj2v7k1Z7idphI",
  authDomain: "xeno-esport.firebaseapp.com",
  projectId: "xeno-esport"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== PRESENCE =====
window.setPresence = async function(isPresent){
let pseudo = document.getElementById("pseudo").value.trim();
if(!pseudo) return alert("Pseudo !");

await setDoc(doc(db,"players",pseudo),{
name:pseudo,
present:isPresent
});
}

// ===== LIVE PLAYERS =====
onSnapshot(collection(db,"players"),(snap)=>{

let present=[];
let absent=[];

snap.forEach(doc=>{
let d = doc.data();
if(d.present){present.push(d.name);}
else{absent.push(d.name);}
});

document.getElementById("presentList").innerHTML =
present.map(p=>"<li>"+p+"</li>").join("");

document.getElementById("absentList").innerHTML =
absent.map(p=>"<li>"+p+"</li>").join("");

});

// ===== TOURNOI =====
window.saveTournament = async function(){

let t={
name:tourName.value,
date:tourDate.value,
time:tourTime.value,
game:tourGame.value,
players:tourPlayers.value
};

await setDoc(doc(db,"global","tournoi"),t);
}

// LIVE tournoi
onSnapshot(doc(db,"global","tournoi"),(snap)=>{
let t = snap.data();
if(!t) return;

document.getElementById("tournamentDisplay").innerHTML = `
<div class="tournament">
<h2>🏆 ${t.name}</h2>
<p>📅 ${t.date}</p>
<p>⏰ ${t.time}</p>
<p>🎮 ${t.game}</p>
<p>👥 ${t.players} joueurs</p>
</div>
`;
});

// ===== ADMIN =====
const PASSWORD="Antoninfaure28&";

window.loginAdmin = function(){
let pass=prompt("Mot de passe");
if(pass===PASSWORD){
document.querySelectorAll(".admin").forEach(b=>b.style.display="inline-block");
}
}

window.toggleForm = function(){
let f=document.getElementById("tournamentForm");
f.style.display=(f.style.display==="none")?"block":"none";
}

// ===== GALAXIE =====
const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = Array(800).fill().map(()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*1.5,
speed:Math.random()*0.5
}));

function animate(){
ctx.fillStyle="rgba(10,0,20,0.6)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

s.y+=s.speed;
if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
