<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSK Esport – Rocket League & Warzone Team FR</title>

<meta name="description" content="NSK Esport est une team gaming compétitive spécialisée sur Rocket League et Warzone. Rejoins notre Discord et participe au recrutement.">

<style>

/* ========================= */
/* BASE */
/* ========================= */

*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  overflow-x:hidden;
  font-family:Arial,sans-serif;
  color:white;
  background:black;
}

/* ========================= */
/* ULTRA BACKGROUND NSK */
/* ========================= */

.bg{
  position:fixed;
  inset:0;
  overflow:hidden;
  background:
  radial-gradient(circle at 20% 20%, rgba(255,0,0,0.18), transparent 25%),
  radial-gradient(circle at 80% 80%, rgba(255,0,0,0.12), transparent 30%),
  linear-gradient(135deg,#000000,#050505,#140000);
  z-index:-10;
}

.bg::before{
  content:"";
  position:absolute;
  width:900px;
  height:900px;
  background:radial-gradient(circle, rgba(255,0,0,0.18), transparent 70%);
  top:-250px;
  left:-250px;
  filter:blur(120px);
  animation:smokeMove1 18s infinite alternate ease-in-out;
}

.bg::after{
  content:"";
  position:absolute;
  width:800px;
  height:800px;
  background:radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
  bottom:-250px;
  right:-200px;
  filter:blur(100px);
  animation:smokeMove2 22s infinite alternate ease-in-out;
}

/* GRID */

.grid{
  position:fixed;
  inset:0;
  background-image:
  linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
  z-index:-8;
  animation:gridMove 10s linear infinite;
}

/* PARTICULES */

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-9;
}

.particles span{
  position:absolute;
  display:block;
  border-radius:50%;
  animation:float linear infinite;
}

.particles span:nth-child(1){width:2px;height:2px;left:5%;top:100%;background:#fff;animation-duration:14s;}
.particles span:nth-child(2){width:3px;height:3px;left:15%;top:100%;background:#ff1e1e;animation-duration:18s;}
.particles span:nth-child(3){width:2px;height:2px;left:25%;top:100%;background:#fff;animation-duration:12s;}
.particles span:nth-child(4){width:4px;height:4px;left:35%;top:100%;background:#ff1e1e;animation-duration:22s;}
.particles span:nth-child(5){width:3px;height:3px;left:45%;top:100%;background:#fff;animation-duration:17s;}
.particles span:nth-child(6){width:2px;height:2px;left:55%;top:100%;background:#ff1e1e;animation-duration:15s;}
.particles span:nth-child(7){width:4px;height:4px;left:65%;top:100%;background:#fff;animation-duration:20s;}
.particles span:nth-child(8){width:3px;height:3px;left:75%;top:100%;background:#ff1e1e;animation-duration:13s;}
.particles span:nth-child(9){width:2px;height:2px;left:85%;top:100%;background:#fff;animation-duration:19s;}
.particles span:nth-child(10){width:5px;height:5px;left:95%;top:100%;background:#ff1e1e;animation-duration:25s;}

/* ========================= */
/* NAV */
/* ========================= */

nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.45);
  z-index:1000;
  border-bottom:1px solid rgba(255,0,0,0.2);
}

nav .logo{
  color:#ff1e1e;
  font-weight:bold;
  letter-spacing:2px;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:15px;
}

nav a:hover{
  color:#ff1e1e;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:120px 20px;
}

.title{
  font-size:65px;
  font-weight:bold;
  text-shadow:0 0 25px rgba(255,0,0,0.5);
}

.subtitle{
  opacity:0.8;
  margin:10px 0 25px;
}

.discord-btn,
.recruit-btn{
  display:inline-block;
  padding:15px 30px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  margin:5px;
}

.discord-btn{
  background:#ff1e1e;
  color:white;
}

.recruit-btn{
  background:white;
  color:black;
}

/* ========================= */
/* SECTIONS */
/* ========================= */

section{
  padding:80px 20px;
  text-align:center;
}

h2{
  color:#ff1e1e;
  font-size:35px;
}

.text-box{
  max-width:800px;
  margin:auto;
  padding:25px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

/* CARDS */

.card{
  display:inline-block;
  width:240px;
  margin:10px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

/* FORM */

.form-container{
  max-width:600px;
  margin:auto;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:15px;
  background:#ff1e1e;
  color:white;
  border:none;
  cursor:pointer;
}

/* FOOTER */

footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}

/* ========================= */
/* ANIMATIONS */
/* ========================= */

@keyframes smokeMove1{
  0%{transform:translate(0,0);}
  100%{transform:translate(150px,100px);}
}

@keyframes smokeMove2{
  0%{transform:translate(0,0);}
  100%{transform:translate(-120px,-80px);}
}

@keyframes float{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-120vh);opacity:0;}
}

@keyframes gridMove{
  0%{transform:translateY(0);}
  100%{transform:translateY(60px);}
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>
<div class="grid"></div>

<div class="particles">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- NAV -->
<nav>
  <div class="logo">NSK ESPORT</div>
  <div>
    <a href="#discord">Discord</a>
    <a href="#recrutement">Recrutement</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <div class="title">NSK ESPORT</div>
    <div class="subtitle">Rocket League • Warzone</div>

    <a class="discord-btn" href="https://discord.gg/hc8jRWGfsU">Rejoindre Discord</a>
    <a class="recruit-btn" href="#recrutement">Recrutement</a>
  </div>
</div>

<!-- ABOUT -->
<section>
  <h2>QUI SOMMES-NOUS</h2>
  <div class="text-box">
    Team compétitive Rocket League & Warzone.
  </div>
</section>

<!-- ACTIVITIES -->
<section>
  <h2>NOS ACTIVITÉS</h2>
  <div class="card">🏆 Tournois</div>
  <div class="card">🎮 Training</div>
  <div class="card">🔥 Discord actif</div>
</section>

<!-- DISCORD -->
<section id="discord">
  <h2>DISCORD</h2>
  <a class="discord-btn" href="#">Rejoindre</a>
</section>

<!-- RECRUTEMENT -->
<section id="recrutement">
  <h2>RECRUTEMENT</h2>

  <div class="form-container">
    <input id="prenom" placeholder="Prénom">
    <input id="nom" placeholder="Nom">
    <input id="email" type="email" placeholder="Email">
    <input id="age" type="number" placeholder="Âge">

    <select id="jeu">
      <option>Rocket League</option>
      <option>Warzone</option>
    </select>

    <input id="experience" placeholder="Expérience">
    <textarea id="motivation" placeholder="Motivation"></textarea>

    <button onclick="sendApplication()">Envoyer</button>
  </div>
</section>

<footer>© 2026 NSK Esport</footer>

<script>
function sendApplication(){
  alert("Candidature envoyée !");
}
</script>

</body>
</html>
