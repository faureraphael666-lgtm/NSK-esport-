<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Xeno eSport</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
background:radial-gradient(circle,#2b0050,#0a0014);
color:white;
}

/* GALAXIE */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HEADER */
header{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.6);
}

h1{color:#a855f7;font-size:30px;}

/* SYSTEM */
.system{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* PSEUDO */
#pseudo{
padding:18px;
font-size:20px;
width:90%;
max-width:400px;
border-radius:15px;
text-align:center;
margin-bottom:15px;
}

/* TOURNOI (JUSTE SOUS PSEUDO) */
.tournament-box{
width:90%;
max-width:700px;
background:#111;
padding:25px;
border-radius:20px;
border:1px solid #8a2be244;
box-shadow:0 0 25px #8a2be233;
text-align:center;
margin-bottom:20px;
}

/* BOUTONS */
button{
padding:16px 30px;
font-size:18px;
margin:10px;
border:none;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{transform:scale(1.1);}

.present{background:#00ff88;}
.absent{background:#ff0033;color:white;}
.admin{background:gold;color:black;display:none;}

/* GRID */
.main-grid{
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
width:100%;
margin-top:20px;
}

.box{
width:90%;
max-width:700px;
min-height:200px;
background:#111;
padding:25px;
border-radius:20px;
border:1px solid #8a2be244;
box-shadow:0 0 25px #8a2be233;
font-size:18px;
}

.box h3{color:#a855f7;margin-bottom:10px;}

ul{list-style:none;}
li{margin:6px 0;}

/* FORM */
#tournamentForm{
display:none;
margin-top:10px;
}
</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<header>
<h1>Xeno eSport</h1>
</header>

<section class="system">

<input id="pseudo" placeholder="Entre ton pseudo">

<!-- TOURNOI ICI -->
<div id="tournament" class="tournament-box"></div>

<div>
<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>
</div>

<button onclick="loginAdmin()">Connexion Admin</button>

<div>
<button class="admin" onclick="toggleForm()">Créer tournoi</button>
</div>

<div id="tournamentForm">
<input id="tourName" placeholder="Nom"><br>
<input id="tourDate" type="date"><br>
<input id="tourTime" type="time"><br>
<input id="tourGame" placeholder="Jeu"><br>
<input id="tourPlayers" placeholder="Joueurs max"><br>
<button onclick="saveTournament()">Valider</button>
</div>

</section>

<div class="main-grid">

<div class="box">
<h3>🟢 Présents</h3>
<ul id="presentList"></ul>
</div>

<div class="box">
<h3>🔴 Absents</h3>
<ul id="absentList"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdLM-v9HlqIj2v7k1Z7idphI",
  authDomain: "xeno-esport.firebaseapp.com",
  projectId: "xeno-esport"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// PRESENCE
window.setPresence = async function(isPresent){
let pseudo = document.getElementById("pseudo").value.trim();
if(!pseudo) return alert("Entre un pseudo");

await setDoc(doc(db,"players",pseudo),{
name:pseudo,
present:isPresent
});
}

// LIVE PLAYERS
onSnapshot(collection(db,"players"),(snap)=>{
let present=[], absent=[];
snap.forEach(d=>{
let data=d.data();
data.present ? present.push(data.name) : absent.push(data.name);
});
presentList.innerHTML = present.map(p=>"<li>"+p+"</li>").join("");
absentList.innerHTML = absent.map(p=>"<li>"+p+"</li>").join("");
});

// TOURNOI SAVE
window.saveTournament = async function(){
let t={
name:tourName.value,
date:tourDate.value,
time:tourTime.value,
game:tourGame.value,
players:tourPlayers.value
};
await setDoc(doc(db,"global","tournoi"),t);
}

// TOURNOI LIVE (AFFICHÉ EN HAUT)
onSnapshot(doc(db,"global","tournoi"),(snap)=>{
let t=snap.data();
if(!t) return;

document.getElementById("tournament").innerHTML=`
<h2>🏆 ${t.name}</h2>
<p>📅 ${t.date}</p>
<p>⏰ ${t.time}</p>
<p>🎮 ${t.game}</p>
<p>👥 ${t.players} joueurs max</p>`;
});

// ADMIN
const PASSWORD="Antoninfaure28&";

window.loginAdmin=function(){
if(prompt("Mot de passe")==PASSWORD){
document.querySelectorAll(".admin").forEach(b=>b.style.display="inline-block");
}
}

// FORM
window.toggleForm=function(){
tournamentForm.style.display =
tournamentForm.style.display==="none"?"block":"none";
}

// GALAXIE
const canvas=document.getElementById("galaxy");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=Array(800).fill().map(()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.6
}));

function animate(){
ctx.fillStyle="rgba(10,0,20,0.6)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

s.y+=s.speed;
if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
