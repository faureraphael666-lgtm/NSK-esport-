<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM TOXIC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* ☢️ LIQUID RADIOACTIF */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:
radial-gradient(circle at 30% 30%, rgba(0,255,120,0.15), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(0,255,100,0.12), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(0,255,80,0.1), transparent 40%);
animation:liquid 12s infinite linear;
z-index:-1;
filter:blur(60px);
}

@keyframes liquid{
0%{transform:rotate(0deg) scale(1);}
50%{transform:rotate(180deg) scale(1.2);}
100%{transform:rotate(360deg) scale(1);}
}

/* HERO */
.hero{
height:40vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.glitch{
font-size:50px;
color:#00ff88;
text-shadow:0 0 10px #00ff88,0 0 25px #00ff88;
}

/* SYSTEM */
.system{text-align:center;padding:20px;}

input{
padding:12px;
border:none;
border-radius:10px;
margin:8px;
width:220px;
text-align:center;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

.present{background:#00ff88;}
.absent{background:#ff0033;color:white;}
.admin{background:gold;color:black;display:none;}
.login-btn{background:#00cc66;color:black;font-weight:bold;}

button:hover{transform:scale(1.1);}

.lists{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
flex-wrap:wrap;
}

.list-box{
background:#111;
padding:15px;
border-radius:10px;
min-width:200px;
border:1px solid #00ff8850;
}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px #00ff88;
}

</style>
</head>

<body>

<section class="hero">
<h1 class="glitch">☣️ TEAM TOXIC ☣️</h1>
<p>Système de présence team</p>
</section>

<section class="system">

<input type="text" id="pseudo" placeholder="Entre ton pseudo">

<div>
<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>
</div>

<!-- BOUTON LOGIN -->
<button class="login-btn" onclick="openPopup()">Connexion Admin</button>

<!-- ADMIN BUTTONS -->
<div>
<button id="createBtn" class="admin">Créer tournoi</button>
<button id="editBtn" class="admin">Modifier tournoi</button>
<button id="deleteBtn" class="admin">Supprimer tournoi</button>
</div>

<div class="lists">
<div class="list-box">
<h3>🟢 Présents</h3>
<ul id="presentList"></ul>
</div>
<div class="list-box">
<h3>🔴 Absents</h3>
<ul id="absentList"></ul>
</div>
</div>

</section>

<!-- POPUP LOGIN -->
<div id="popup">
<div class="popup-box">
<h3>Connexion Admin</h3>
<input type="text" id="adminId" placeholder="Identifiant"><br>
<input type="password" id="adminPass" placeholder="Mot de passe"><br>
<button onclick="loginAdmin()">Valider</button><br>
<button onclick="closePopup()">Fermer</button>
</div>
</div>

<script>

// ===== PRESENCE =====
let presentPlayers=JSON.parse(localStorage.getItem("present"))||[];
let absentPlayers=JSON.parse(localStorage.getItem("absent"))||[];

function renderLists(){
const presentList=document.getElementById("presentList");
const absentList=document.getElementById("absentList");
presentList.innerHTML="";
absentList.innerHTML="";
presentPlayers.forEach(p=>{let li=document.createElement("li");li.textContent=p;presentList.appendChild(li);});
absentPlayers.forEach(p=>{let li=document.createElement("li");li.textContent=p;absentList.appendChild(li);});
}

function saveData(){
localStorage.setItem("present",JSON.stringify(presentPlayers));
localStorage.setItem("absent",JSON.stringify(absentPlayers));
}

function setPresence(isPresent){
let pseudo=document.getElementById("pseudo").value.trim();
if(!pseudo){alert("Entre ton pseudo !");return;}

presentPlayers=presentPlayers.filter(p=>p!==pseudo);
absentPlayers=absentPlayers.filter(p=>p!==pseudo);

if(isPresent){presentPlayers.push(pseudo);}
else{absentPlayers.push(pseudo);}

saveData();
renderLists();
document.getElementById("pseudo").value="";
}

// ===== POPUP =====
function openPopup(){document.getElementById("popup").style.display="flex";}
function closePopup(){document.getElementById("popup").style.display="none";}

// ===== ADMIN LOGIN =====
const ADMIN_ID="230851";
const ADMIN_PASS="test.test";

function loginAdmin(){
let id=document.getElementById("adminId").value;
let pass=document.getElementById("adminPass").value;

if(id===ADMIN_ID && pass===ADMIN_PASS){
document.querySelectorAll(".admin").forEach(btn=>btn.style.display="inline-block");
closePopup();
alert("Connexion réussie");
}else{
alert("Identifiants incorrects");
}
}

// INIT
window.onload=renderLists;

</script>

</body>
</html>
