<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xeno eSport - Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
background:black;
color:white;
text-align:center;
padding:20px;
}

input{
padding:12px;
border:none;
border-radius:10px;
margin:5px;
width:220px;
text-align:center;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{transform:scale(1.1);}

.present{background:#00ff88;}
.absent{background:#ff0033;color:white;}
.admin{background:gold;color:black;display:none;}

.tournament{
background:#111;
padding:15px;
border-radius:10px;
margin:20px auto;
width:320px;
border:1px solid #8a2be244;
}

#tournamentForm{
display:none;
margin-top:15px;
}
</style>
</head>

<body>

<h1>🔥 Xeno eSport</h1>

<input type="text" id="pseudo" placeholder="Entre ton pseudo"><br>

<button onclick="loginAdmin()">Connexion Admin</button>

<br>

<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>

<br>

<button id="createBtn" class="admin" onclick="toggleForm()">Créer tournoi</button>
<button id="deleteBtn" class="admin" onclick="deleteTournament()">Supprimer tournoi</button>

<div id="tournamentForm">
<h3>Créer un tournoi</h3>

<input type="text" id="tourName" placeholder="Nom du tournoi"><br>
<input type="date" id="tourDate"><br>
<input type="time" id="tourTime"><br>
<input type="text" id="tourGame" placeholder="Jeu"><br>
<input type="number" id="tourPlayers" placeholder="Joueurs max / équipe"><br>

<button onclick="saveTournament()">Valider</button>
</div>

<div id="tournamentDisplay"></div>

<script>

// ===== MOT DE PASSE ADMIN =====
const PASSWORD = "Antoninfaure28&";

function loginAdmin(){
let pass = prompt("Mot de passe admin :");

if(pass === PASSWORD){
alert("Mode admin activé 🔥");
document.querySelectorAll(".admin").forEach(btn=>{
btn.style.display="inline-block";
});
}else{
alert("Mot de passe incorrect ❌");
}
}

// ===== DATA =====
let present = JSON.parse(localStorage.getItem("present")) || [];
let absent = JSON.parse(localStorage.getItem("absent")) || [];
let tournament = JSON.parse(localStorage.getItem("tournament")) || null;

// ===== SAVE =====
function saveAll(){
localStorage.setItem("present", JSON.stringify(present));
localStorage.setItem("absent", JSON.stringify(absent));
localStorage.setItem("tournament", JSON.stringify(tournament));
}

// ===== PRESENCE =====
function setPresence(isPresent){
let pseudo = document.getElementById("pseudo").value;

if(!pseudo){
alert("Entre un pseudo !");
return;
}

present = present.filter(p=>p!==pseudo);
absent = absent.filter(p=>p!==pseudo);

if(isPresent){
present.push(pseudo);
}else{
absent.push(pseudo);
}

saveAll();
}

// ===== FORM =====
function toggleForm(){
let f = document.getElementById("tournamentForm");
f.style.display = (f.style.display==="none") ? "block" : "none";
}

// ===== SAVE TOURNOI =====
function saveTournament(){

let name = document.getElementById("tourName").value;
let date = document.getElementById("tourDate").value;
let time = document.getElementById("tourTime").value;
let game = document.getElementById("tourGame").value;
let players = document.getElementById("tourPlayers").value;

if(!name || !date || !time || !game || !players){
alert("Remplis tous les champs !");
return;
}

tournament = {name, date, time, game, players};

saveAll();
renderTournament();
toggleForm();
}

// ===== AFFICHAGE =====
function renderTournament(){

const display = document.getElementById("tournamentDisplay");
display.innerHTML = "";

if(tournament){
display.innerHTML = `
<div class="tournament">
<h2>🏆 ${tournament.name}</h2>
<p>📅 ${tournament.date}</p>
<p>⏰ ${tournament.time}</p>
<p>🎮 ${tournament.game}</p>
<p>👥 ${tournament.players} joueurs / équipe</p>
</div>
`;
}
}

// ===== DELETE =====
function deleteTournament(){
if(confirm("Supprimer le tournoi ?")){
tournament = null;
saveAll();
renderTournament();
}
}

// ===== LOAD =====
window.onload = function(){
renderTournament();
};

</script>

</body>
</html>
