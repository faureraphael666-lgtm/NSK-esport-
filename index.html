<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Team eSport - Galaxie</title>
<style>
/* ===== Style global ===== */
* { box-sizing: border-box; }
body, html {
  margin: 0;
  padding: 0;
  font-family: 'Arial', sans-serif;
  overflow-x: hidden;
  background: radial-gradient(ellipse at bottom, #050505 0%, #000000 100%);
  color: white;
  min-height: 100vh;
}

/* ===== Fond galaxie ===== */
canvas#canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
  width: 100%;
  height: 100%;
}

/* ===== Header ===== */
header {
  text-align: center;
  padding: 50px 20px 30px 20px;
}
header h1 {
  font-size: 3em;
  margin: 0;
  text-shadow: 0 0 20px #0ff, 0 0 40px #6f0, 0 0 60px #fff;
}

/* ===== Section tournois ===== */
#tournaments {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  max-width: 1200px;
  margin: 0 auto 50px auto;
  padding: 0 20px;
}

/* ===== Cartes tournoi ===== */
.tournament {
  background: rgba(0,0,50,0.7);
  border-radius: 15px;
  padding: 25px;
  width: 300px;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 0 20px #0ff;
}
.tournament:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 30px #6f0;
}
.tournament strong { font-size: 1.2em; }
.tournament em { font-style: normal; color: #6cf; }

/* ===== Boutons ===== */
button {
  margin: 8px 5px 8px 0;
  padding: 8px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: transform 0.2s, box-shadow 0.2s;
}
button:hover { transform: scale(1.05); box-shadow: 0 0 15px #fff; }

button.present { background: #0f0; color: #000; }
button.absent { background: #f00; color: #fff; }
button.incertain { background: #ff0; color: #000; }

/* ===== Liste participants ===== */
.participants-list { margin-top: 10px; font-size: 0.9em; }
.category-title { font-weight: bold; text-decoration: underline; margin-top: 5px; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<header>
  <h1>Team eSport - Tournois</h1>
</header>

<section id="tournaments">
  <!-- Exemple de carte tournoi (tu remplis toi-même) -->
  <div class="tournament" data-id="1">
    <strong>Nom du tournoi</strong> - <em>Jeu</em> - <em>Date</em><br>
    <button class="present">✅ Je participe</button>
    <button class="absent">❌ Je ne peux pas</button>
    <button class="incertain">❓ Incertain</button>
    <div class="participants-list"></div>
  </div>
  <div class="tournament" data-id="2">
    <strong>Nom du tournoi</strong> - <em>Jeu</em> - <em>Date</em><br>
    <button class="present">✅ Je participe</button>
    <button class="absent">❌ Je ne peux pas</button>
    <button class="incertain">❓ Incertain</button>
    <div class="participants-list"></div>
  </div>
</section>

<script>
// ===== Pseudo demandé UNE seule fois =====
let playerPseudo = localStorage.getItem("playerPseudo");
if(!playerPseudo){
  playerPseudo = prompt("Bienvenue ! Entre ton pseudo :");
  if(!playerPseudo) playerPseudo = "Anonyme";
  localStorage.setItem("playerPseudo", playerPseudo);
}

// ===== Gestion dynamique des participants =====
const tournaments = document.querySelectorAll(".tournament");
tournaments.forEach(card => {
  const participants = { present: [], absent: [], incertain: [] };
  const buttons = card.querySelectorAll("button");
  const listDiv = card.querySelector(".participants-list");

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      const category = btn.className;
      ["present","absent","incertain"].forEach(cat=>{
        const i = participants[cat].indexOf(playerPseudo);
        if(i>-1) participants[cat].splice(i,1);
      });
      participants[category].push(playerPseudo);
      renderList();
    });
  });

  function renderList(){
    let html = "";
    ["present","absent","incertain"].forEach(cat=>{
      if(participants[cat].length>0){
        html += `<div class="category-title">${cat.charAt(0).toUpperCase()+cat.slice(1)}:</div>`+
                participants[cat].join(", ") + "<br>";
      }
    });
    listDiv.innerHTML = html;
  }
});

// ===== Fond galaxie animé =====
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let shootingStars = [];
for(let i=0;i<300;i++){
  stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, radius:Math.random()*1.5, alpha:Math.random()});
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.alpha})`;
    ctx.fill();
  });

  if(Math.random()<0.02){
    shootingStars.push({x:Math.random()*canvas.width, y:0, length:Math.random()*200+100, speed:Math.random()*10+6});
  }

  shootingStars.forEach((star,i)=>{
    ctx.beginPath();
    ctx.moveTo(star.x,star.y);
    ctx.lineTo(star.x-star.length, star.y+star.length);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();
    star.x += star.speed;
    star.y += star.speed;
    if(star.x>canvas.width || star.y>canvas.height) shootingStars.splice(i,1);
  });

  requestAnimationFrame(drawStars);
}
drawStars();

window.addEventListener('resize', ()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });

</script>

</body>
</html>
