<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM TOXIC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#000;color:white;overflow-x:hidden;}

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:
radial-gradient(circle at 30% 30%, rgba(0,255,120,0.15), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(0,255,100,0.12), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(0,255,80,0.1), transparent 40%);
animation:liquid 12s infinite linear;
z-index:-1;
filter:blur(60px);
}

@keyframes liquid{
0%{transform:rotate(0deg) scale(1);}
50%{transform:rotate(180deg) scale(1.2);}
100%{transform:rotate(360deg) scale(1);}
}

.hero{
height:40vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.glitch{
font-size:40px;
color:#00ff88;
text-shadow:0 0 10px #00ff88,0 0 25px #00ff88;
}

.system{text-align:center;padding:20px;}

input{
padding:12px;
border:none;
border-radius:10px;
margin:8px;
width:220px;
text-align:center;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

button:hover{transform:scale(1.1);}

.present{background:#00ff88;}
.absent{background:#ff0033;color:white;}
.admin{background:gold;color:black;display:none;}
.dev{background:#00aaff;color:black;display:none;}

.login-btn{background:#00cc66;color:black;font-weight:bold;}
.logout{background:#ff0033;color:white;display:none;}

.lists{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
flex-wrap:wrap;
}

.list-box{
background:#111;
padding:15px;
border-radius:10px;
min-width:200px;
border:1px solid #00ff8850;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px #00ff88;
}

#maintenanceScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:30px;
z-index:9999;
}
</style>
</head>

<body>

<div id="maintenanceScreen">
🚧 SITE EN MAINTENANCE<br>
Merci de revenir plus tard
</div>

<section class="hero">
<h1 class="glitch">☣️ TEAM TOXIC ☣️</h1>
<p>Système de présence team</p>
</section>

<section class="system">

<input type="text" id="pseudo" placeholder="Entre ton pseudo">

<div>
<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>
</div>

<button class="login-btn" onclick="openPopup()">Connexion Admin / Dev</button>
<button class="logout" onclick="logout()">Se déconnecter</button>

<div>
<button class="admin" onclick="createTournament()">Créer tournoi</button>
<button class="admin" onclick="editTournament()">Modifier tournoi</button>
<button class="admin" onclick="deleteTournament()">Supprimer tournoi</button>
<button class="admin" onclick="removePlayer()">Supprimer joueur</button>
<button class="admin" onclick="resetPresence()">Reset présences</button>
</div>

<div>
<button class="dev" onclick="exportList()">Exporter liste</button>
<button class="dev" onclick="copyList()">Copier liste</button>
<button class="dev" onclick="showStats()">Statistiques</button>
<button class="dev" onclick="testPlayers()">Test joueurs</button>
<button class="dev" onclick="enableMaintenance()">Activer maintenance</button>
<button class="dev" onclick="disableMaintenance()">Désactiver maintenance</button>
</div>

<div id="tournamentDisplay"></div>

<div class="lists">

<div class="list-box">
<h3 id="presentTitle">🟢 Présents (0)</h3>
<ul id="presentList"></ul>
</div>

<div class="list-box">
<h3 id="absentTitle">🔴 Absents (0)</h3>
<ul id="absentList"></ul>
</div>

</div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBdLM-v9HlqIj2v7k1Z7idphIPyVK3GLlk",
authDomain:"xeno-esport.firebaseapp.com",
projectId:"xeno-esport",
storageBucket:"xeno-esport.firebasestorage.app",
messagingSenderId:"870029280667",
appId:"1:870029280667:web:50a4af541bb484af79cd3e"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let present={},absent={},tournament=null;
let maintenance=false;

function sanitizePseudo(p){return p.replace(/[.#$[\]]/g,"_");}

function render(){
document.getElementById("presentList").innerHTML=Object.values(present).map(p=>`<li>${p.name}</li>`).join("");
document.getElementById("absentList").innerHTML=Object.values(absent).map(p=>`<li>${p.name}</li>`).join("");
document.getElementById("presentTitle").textContent=`🟢 Présents (${Object.keys(present).length})`;
document.getElementById("absentTitle").textContent=`🔴 Absents (${Object.keys(absent).length})`;
}

async function setPresence(isPresent){
if(maintenance){alert("Site en maintenance");return;}

const pseudo=document.getElementById("pseudo").value.trim();
if(!pseudo){alert("Entre ton pseudo");return;}

const key=sanitizePseudo(pseudo);

await setDoc(doc(db,isPresent?'present':'absent',key),{name:pseudo});
await deleteDoc(doc(db,isPresent?'absent':'present',key));

document.getElementById("pseudo").value="";
}

function enableMaintenance(){
maintenance=true;
document.getElementById("maintenanceScreen").style.display="flex";
}

function disableMaintenance(){
maintenance=false;
document.getElementById("maintenanceScreen").style.display="none";
}

onSnapshot(collection(db,"present"),snap=>{
present={};
snap.forEach(d=>present[d.id]=d.data());
render();
});

onSnapshot(collection(db,"absent"),snap=>{
absent={};
snap.forEach(d=>absent[d.id]=d.data());
render();
});

window.setPresence=setPresence;
window.enableMaintenance=enableMaintenance;
window.disableMaintenance=disableMaintenance;

</script>

</body>
</html>
