<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM TOXIC - Test Firebase</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#000;color:white;font-family:'Orbitron',sans-serif;text-align:center;}
input{padding:10px;margin:10px;border-radius:8px;width:200px;}
button{padding:10px 15px;margin:5px;border-radius:8px;cursor:pointer;}
.present{background:#0f0;color:#000;}
.absent{background:#f00;color:#fff;}
.lists{display:flex;justify-content:center;gap:40px;margin-top:20px;}
.list-box{background:#111;padding:15px;border-radius:10px;min-width:150px;border:1px solid #0f0;}
</style>
</head>
<body>

<h1>TEAM TOXIC - Test Firebase</h1>
<input type="text" id="pseudo" placeholder="Entre ton pseudo">
<br>
<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>

<div class="lists">
<div class="list-box">
<h3 id="presentTitle">🟢 Présents (0)</h3>
<ul id="presentList"></ul>
</div>
<div class="list-box">
<h3 id="absentTitle">🔴 Absents (0)</h3>
<ul id="absentList"></ul>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

// === FIREBASE CONFIG ===
const firebaseConfig = {
  apiKey: "AIzaSyBdLM-v9HlqIj2v7k1Z7idphIPyVK3GLlk",
  authDomain: "xeno-esport.firebaseapp.com",
  projectId: "xeno-esport",
  storageBucket: "xeno-esport.firebasestorage.app",
  messagingSenderId: "870029280667",
  appId: "1:870029280667:web:50a4af541bb484af79cd3e"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let present = {};
let absent = {};

function sanitizePseudo(p){ return p.replace(/[.#$[\]]/g,"_"); }

function render(){
  document.getElementById("presentList").innerHTML = Object.values(present||{}).map(p=>`<li>${p.name}</li>`).join("");
  document.getElementById("absentList").innerHTML = Object.values(absent||{}).map(p=>`<li>${p.name}</li>`).join("");
  document.getElementById("presentTitle").textContent = `🟢 Présents (${Object.keys(present||{}).length})`;
  document.getElementById("absentTitle").textContent = `🔴 Absents (${Object.keys(absent||{}).length})`;
}

function setPresence(isPresent){
  const pseudo = document.getElementById("pseudo").value.trim();
  if(!pseudo){ alert("Entre ton pseudo !"); return; }
  const key = sanitizePseudo(pseudo);
  const targetNode = isPresent ? 'present' : 'absent';
  const otherNode = isPresent ? 'absent' : 'present';
  set(ref(db, `${targetNode}/${key}`), {name: pseudo});
  remove(ref(db, `${otherNode}/${key}`));
  document.getElementById("pseudo").value = "";
}

// === SYNC FIREBASE ===
onValue(ref(db,'present'), snap => { present = snap.val() || {}; render(); });
onValue(ref(db,'absent'), snap => { absent = snap.val() || {}; render(); });

window.setPresence = setPresence;
</script>
</body>
</html>
