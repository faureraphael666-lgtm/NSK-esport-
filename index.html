<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xeno eSport - Présence/Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:black;color:white;overflow-x:hidden;}

#galaxy{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}

.hero{height:40vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.glitch{font-size:50px;}

.system{text-align:center;padding:20px;}

input{
padding:12px;
border:none;
border-radius:10px;
margin:5px;
width:220px;
text-align:center;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

.present{background:#00ff88;}
.absent{background:#ff0033;color:white;}
.admin{background:gold;color:black;display:none;}

button:hover{transform:scale(1.1);}

.lists{display:flex;justify-content:center;gap:40px;margin-top:20px;flex-wrap:wrap;}

.list-box{
background:#111;
padding:15px;
border-radius:10px;
min-width:200px;
border:1px solid #8a2be244;
}

.list-box h3{margin-bottom:10px;color:#8a2be2;}

ul{list-style:none;}
li{margin:3px 0;}

#tournamentForm{display:none;margin-top:15px;}

.tournament{
background:#111;
padding:15px;
border-radius:10px;
margin:20px auto;
width:320px;
text-align:center;
border:1px solid #8a2be244;
}
</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<section id="tournamentDisplay"></section>

<section class="hero">
<h1 class="glitch">Xeno eSport</h1>
<p>Système de présence team</p>
</section>

<section class="system">

<input type="text" id="pseudo" placeholder="Entre ton pseudo">

<div>
<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>
</div>

<div>
<button id="createBtn" class="admin" onclick="toggleTournamentForm()">Créer tournoi</button>
<button id="editBtn" class="admin" onclick="editTournament()">Modifier tournoi</button>
<button id="deleteBtn" class="admin" onclick="deleteTournament()">Supprimer tournoi</button>
</div>

<!-- FORMULAIRE COMPLET -->
<div id="tournamentForm">
<h3>Créer un tournoi</h3>

<input type="text" id="tourName" placeholder="Nom du tournoi"><br>
<input type="date" id="tourDate"><br>
<input type="time" id="tourTime"><br>
<input type="text" id="tourGame" placeholder="Jeu (Warzone, etc)"><br>
<input type="number" id="tourPlayers" placeholder="Joueurs max / équipe"><br>

<button onclick="saveTournament()">Valider</button>
</div>

<div class="lists">
<div class="list-box">
<h3>🟢 Présents</h3>
<ul id="presentList"></ul>
</div>

<div class="list-box">
<h3>🔴 Absents</h3>
<ul id="absentList"></ul>
</div>
</div>

</section>

<script>

// ===== GALAXY =====
const canvas=document.getElementById("galaxy");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

let stars=[];
for(let i=0;i<300;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:1+Math.random()*2,
speed:0.5+Math.random()*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

s.y+=s.speed;
if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}
animate();

// ===== PRESENCE =====
let presentPlayers=JSON.parse(localStorage.getItem("present"))||[];
let absentPlayers=JSON.parse(localStorage.getItem("absent"))||[];
let tournament=JSON.parse(localStorage.getItem("tournament"))||null;

function renderLists(){
const presentList=document.getElementById("presentList");
const absentList=document.getElementById("absentList");

presentList.innerHTML="";
absentList.innerHTML="";

presentPlayers.forEach(p=>{
let li=document.createElement("li");
li.textContent=p;
presentList.appendChild(li);
});

absentPlayers.forEach(p=>{
let li=document.createElement("li");
li.textContent=p;
absentList.appendChild(li);
});

renderTournament();
}

function saveData(){
localStorage.setItem("present",JSON.stringify(presentPlayers));
localStorage.setItem("absent",JSON.stringify(absentPlayers));
localStorage.setItem("tournament",JSON.stringify(tournament));
}

function setPresence(isPresent){
let pseudo=document.getElementById("pseudo").value.trim();

if(pseudo===""){
alert("Entre ton pseudo !");
return;
}

presentPlayers=presentPlayers.filter(p=>p!==pseudo);
absentPlayers=absentPlayers.filter(p=>p!==pseudo);

if(isPresent){
presentPlayers.push(pseudo);
}else{
absentPlayers.push(pseudo);
}

saveData();
renderLists();
document.getElementById("pseudo").value="";
}

// ===== ADMIN =====
const adminPseudo="Tiktok-sl3zz";

function checkAdmin(){
let pseudo=document.getElementById("pseudo").value.trim();
let display=(pseudo===adminPseudo)?"inline-block":"none";

document.getElementById("createBtn").style.display=display;
document.getElementById("editBtn").style.display=display;
document.getElementById("deleteBtn").style.display=display;
}

document.getElementById("pseudo").addEventListener("input",checkAdmin);

// ===== TOURNOI =====
function toggleTournamentForm(){
let f=document.getElementById("tournamentForm");
f.style.display=(f.style.display==="none")?"block":"none";
}

function saveTournament(){

let name=document.getElementById("tourName").value;
let date=document.getElementById("tourDate").value;
let time=document.getElementById("tourTime").value;
let game=document.getElementById("tourGame").value;
let players=document.getElementById("tourPlayers").value;

if(!name || !date || !time || !game || !players){
alert("Remplis tous les champs !");
return;
}

tournament={
name,
date,
time,
game,
players
};

saveData();
renderLists();
toggleTournamentForm();
}

function renderTournament(){

const display=document.getElementById("tournamentDisplay");
display.innerHTML="";

if(tournament){

let div=document.createElement("div");
div.className="tournament";

div.innerHTML=`
<h3>🏆 ${tournament.name}</h3>
<p>📅 ${tournament.date}</p>
<p>⏰ ${tournament.time}</p>
<p>🎮 ${tournament.game}</p>
<p>👥 ${tournament.players} joueurs / équipe</p>
`;

display.appendChild(div);
}
}

function editTournament(){
if(!tournament){
alert("Pas de tournoi");
return;
}

toggleTournamentForm();

document.getElementById("tourName").value=tournament.name;
document.getElementById("tourDate").value=tournament.date;
document.getElementById("tourTime").value=tournament.time;
document.getElementById("tourGame").value=tournament.game;
document.getElementById("tourPlayers").value=tournament.players;
}

function deleteTournament(){
if(confirm("Supprimer le tournoi ?")){
tournament=null;
presentPlayers=[];
absentPlayers=[];
saveData();
renderLists();
}
}

// ===== INIT =====
window.onload=function(){
let pseudo=prompt("Entre ton pseudo :");
document.getElementById("pseudo").value=pseudo||"";
checkAdmin();
renderLists();
}
</script>

</body>
</html>
