<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xeno eSport - Présence</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* GALAXY */

#galaxy{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* PORTAL */

.portal{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
animation:fade 3s forwards;
animation-delay:2s;
}

.portal-circle{
width:200px;
height:200px;
border-radius:50%;
border:4px solid #8a2be2;
box-shadow:0 0 40px #8a2be2;
animation:spin 2s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

@keyframes fade{
to{opacity:0; visibility:hidden;}
}

/* HERO */

.hero{
height:40vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.glitch{
font-size:50px;
position:relative;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
}

.glitch::before{
color:#ff00ff;
animation:glitch1 2s infinite;
}

.glitch::after{
color:#00ffff;
animation:glitch2 2s infinite;
}

@keyframes glitch1{
0%{transform:translate(2px,2px)}
50%{transform:translate(-2px,-1px)}
100%{transform:translate(0)}
}

@keyframes glitch2{
0%{transform:translate(-2px,-2px)}
50%{transform:translate(2px,1px)}
100%{transform:translate(0)}
}

/* SYSTEM */

.system{
text-align:center;
padding:50px 20px;
}

input{
padding:15px;
border:none;
border-radius:10px;
margin-top:20px;
width:250px;
text-align:center;
}

.buttons{
margin-top:20px;
}

button{
padding:15px 25px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.present{
background:#00ff88;
}

.absent{
background:#ff0033;
color:white;
}

button:hover{
transform:scale(1.1);
}

/* LIST */

.lists{
display:flex;
justify-content:center;
gap:50px;
margin-top:40px;
flex-wrap:wrap;
}

.list-box{
background:#111;
padding:20px;
border-radius:15px;
min-width:250px;
border:1px solid #8a2be244;
}

.list-box h3{
margin-bottom:15px;
color:#8a2be2;
}

ul{
list-style:none;
}

li{
margin:5px 0;
}

</style>
</head>

<body>

<div class="portal">
<div class="portal-circle"></div>
</div>

<canvas id="galaxy"></canvas>

<section class="hero">
<h1 class="glitch" data-text="Xeno eSport">Xeno eSport</h1>
<p>Système de présence team</p>
</section>

<section class="system">

<h2>Indique ta présence</h2>

<input type="text" id="pseudo" placeholder="Entre ton pseudo">

<div class="buttons">
<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button>
</div>

<div class="lists">

<div class="list-box">
<h3>🟢 Présents</h3>
<ul id="presentList"></ul>
</div>

<div class="list-box">
<h3>🔴 Absents</h3>
<ul id="absentList"></ul>
</div>

</div>

</section>

<script>

/* GALAXY */

const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars=[];

for(let i=0;i<300;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
ctx.fill();

star.y+=star.speed;

if(star.y>canvas.height){
star.y=0;
star.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();

/* STORAGE */

let presentPlayers = JSON.parse(localStorage.getItem("present")) || [];
let absentPlayers = JSON.parse(localStorage.getItem("absent")) || [];

/* DISPLAY */

function renderLists(){

const presentList = document.getElementById("presentList");
const absentList = document.getElementById("absentList");

presentList.innerHTML = "";
absentList.innerHTML = "";

presentPlayers.forEach(pseudo=>{
let li = document.createElement("li");
li.textContent = pseudo;
presentList.appendChild(li);
});

absentPlayers.forEach(pseudo=>{
let li = document.createElement("li");
li.textContent = pseudo;
absentList.appendChild(li);
});

}

/* SAVE */

function saveData(){
localStorage.setItem("present", JSON.stringify(presentPlayers));
localStorage.setItem("absent", JSON.stringify(absentPlayers));
}

/* PRESENCE */

function setPresence(isPresent){

let pseudo = document.getElementById("pseudo").value.trim();

if(pseudo === ""){
alert("Entre ton pseudo !");
return;
}

presentPlayers = presentPlayers.filter(p => p !== pseudo);
absentPlayers = absentPlayers.filter(p => p !== pseudo);

if(isPresent){
presentPlayers.push(pseudo);
}else{
absentPlayers.push(pseudo);
}

saveData();
renderLists();

document.getElementById("pseudo").value="";

}

/* LOAD */

renderLists();

</script>

</body>
</html>
