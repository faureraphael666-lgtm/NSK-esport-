<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSK Esport – Rocket League & Warzone Team FR</title>

<meta name="description" content="NSK Esport est une team gaming compétitive spécialisée sur Rocket League et Warzone. Rejoins notre Discord et participe au recrutement.">

<meta name="keywords" content="NSK Esport, Rocket League, Warzone, team esport france, recrutement esport">

<link rel="canonical" href="https://nsk-esport.netlify.app/">

<style>

/* ========================= */
/* BASE */
/* ========================= */

*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  overflow-x:hidden;
  font-family:Arial,sans-serif;
  color:white;
  background:black;
}

/* ========================= */
/* ULTRA BACKGROUND NSK */
/* ========================= */

.bg{
  position:fixed;
  inset:0;
  overflow:hidden;
  background:
  radial-gradient(circle at 20% 20%, rgba(255,0,0,0.18), transparent 25%),
  radial-gradient(circle at 80% 80%, rgba(255,0,0,0.12), transparent 30%),
  linear-gradient(135deg,#000000,#050505,#140000);
  z-index:-10;
}

/* FUMÉE ROUGE */

.bg::before{
  content:"";
  position:absolute;
  width:900px;
  height:900px;
  background:radial-gradient(circle, rgba(255,0,0,0.18), transparent 70%);
  top:-250px;
  left:-250px;
  filter:blur(120px);
  animation:smokeMove1 18s infinite alternate ease-in-out;
}

/* FUMÉE BLANCHE */

.bg::after{
  content:"";
  position:absolute;
  width:800px;
  height:800px;
  background:radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
  bottom:-250px;
  right:-200px;
  filter:blur(100px);
  animation:smokeMove2 22s infinite alternate ease-in-out;
}

/* GRID */

.grid{
  position:fixed;
  inset:0;
  background-image:
  linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
  z-index:-8;
  animation:gridMove 10s linear infinite;
}

/* PARTICULES */

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-9;
}

.particles span{
  position:absolute;
  display:block;
  border-radius:50%;
  animation:float linear infinite;
}

.particles span:nth-child(1){ width:2px;height:2px;left:5%;top:100%;background:#fff;animation-duration:14s; }
.particles span:nth-child(2){ width:3px;height:3px;left:15%;top:100%;background:#ff1e1e;animation-duration:18s; }
.particles span:nth-child(3){ width:2px;height:2px;left:25%;top:100%;background:#fff;animation-duration:12s; }
.particles span:nth-child(4){ width:4px;height:4px;left:35%;top:100%;background:#ff1e1e;animation-duration:22s; }
.particles span:nth-child(5){ width:3px;height:3px;left:45%;top:100%;background:#fff;animation-duration:17s; }
.particles span:nth-child(6){ width:2px;height:2px;left:55%;top:100%;background:#ff1e1e;animation-duration:15s; }
.particles span:nth-child(7){ width:4px;height:4px;left:65%;top:100%;background:#fff;animation-duration:20s; }
.particles span:nth-child(8){ width:3px;height:3px;left:75%;top:100%;background:#ff1e1e;animation-duration:13s; }
.particles span:nth-child(9){ width:2px;height:2px;left:85%;top:100%;background:#fff;animation-duration:19s; }
.particles span:nth-child(10){ width:5px;height:5px;left:95%;top:100%;background:#ff1e1e;animation-duration:25s; }

/* ========================= */
/* NAV */
/* ========================= */

nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.45);
  z-index:1000;
  border-bottom:1px solid rgba(255,0,0,0.2);
}

nav .logo{
  color:#ff1e1e;
  font-weight:bold;
  letter-spacing:2px;
  font-size:20px;
}

.nav-links{
  display:flex;
  gap:20px;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

nav a:hover{
  color:#ff1e1e;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:120px 20px;
}

.title{
  font-size:65px;
  font-weight:bold;
  text-shadow:0 0 25px rgba(255,0,0,0.5);
}

.subtitle{
  opacity:0.9;
  margin:10px 0 25px;
  color:#d6d6d6;
}

.discord-btn,
.recruit-btn{
  display:inline-block;
  padding:15px 30px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  margin:6px;
}

.discord-btn{
  background:#ff1e1e;
  color:white;
}

.recruit-btn{
  background:white;
  color:black;
}

/* ========================= */
/* SECTIONS */
/* ========================= */

section{
  padding:90px 20px;
  text-align:center;
}

h2{
  color:#ff1e1e;
  font-size:35px;
  margin-bottom:25px;
}

.text-box{
  max-width:900px;
  margin:auto;
  padding:30px;
  background:rgba(255,255,255,0.04);
  border-radius:15px;
  border:1px solid rgba(255,0,0,0.15);
}

/* CARDS */

.card{
  display:inline-block;
  width:260px;
  margin:12px;
  padding:25px;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  border:1px solid rgba(255,0,0,0.2);
}

/* FORM */

.form-container{
  max-width:700px;
  margin:auto;
  padding:25px;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
}

input,select,textarea{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:15px;
  background:#ff1e1e;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* FOOTER */

footer{
  text-align:center;
  padding:25px;
  opacity:0.6;
}

/* ========================= */
/* ANIMATIONS */
/* ========================= */

@keyframes smokeMove1{
  0%{transform:translate(0,0) scale(1);}
  50%{transform:translate(100px,50px) scale(1.15);}
  100%{transform:translate(180px,120px) scale(1.3);}
}

@keyframes smokeMove2{
  0%{transform:translate(0,0) scale(1);}
  50%{transform:translate(-80px,-60px) scale(1.1);}
  100%{transform:translate(-150px,-120px) scale(1.25);}
}

@keyframes float{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-120vh);opacity:0;}
}

@keyframes gridMove{
  0%{transform:translateY(0);}
  100%{transform:translateY(60px);}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="grid"></div>

<div class="particles">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<nav>
  <div class="logo">NSK ESPORT</div>
  <div class="nav-links">
    <a href="#discord">Discord</a>
    <a href="#recrutement">Recrutement</a>
  </div>
</nav>

<div class="hero">
  <div>
    <div class="title">NSK ESPORT</div>
    <div class="subtitle">Rocket League • Warzone • Roblox</div>

    <a class="discord-btn" href="https://discord.gg/hc8jRWGfsU" target="_blank">Rejoindre Discord</a>
    <a class="recruit-btn" href="#recrutement">Recrutement</a>
  </div>
</div>

<section>
  <h2>QUI SOMMES-NOUS</h2>
  <div class="text-box">
    NSK Esport est une team compétitive Rocket League & Warzone.
  </div>
</section>

<section>
  <h2>NOS ACTIVITÉS</h2>
  <div class="card">🏆 Tournois</div>
  <div class="card">🎮 Training</div>
  <div class="card">🔥 Discord actif</div>
</section>

<section id="discord">
  <h2>DISCORD</h2>
  <a class="discord-btn" href="https://discord.gg/fP6ucnqnn2" target="_blank">Rejoindre</a>
</section>

<section id="recrutement">
  <h2>RECRUTEMENT</h2>

  <div class="form-container">
    <input id="prenom" placeholder="Prénom">
    <input id="nom" placeholder="Nom">
    <input id="email" type="email" placeholder="Email">
    <input id="age" type="number" placeholder="Âge">

    <select id="jeu">
      <option>Rocket League</option>
      <option>Warzone</option>
      <option>Les deux</option>
    </select>

    <input id="experience" placeholder="Expérience">
    <textarea id="motivation" placeholder="Motivation"></textarea>

    <button onclick="sendApplication()">Envoyer candidature</button>
  </div>
</section>

<footer>© 2026 NSK Esport</footer>

<script>
function sendApplication(){
  const webhook = "https://discord.com/api/webhooks/1506483965413032107/k1KphgLv_5pKCzHgfcS82pTZb_V40XuLT6BqN6eInsf4kWGcQfcyy00uJ0DDMsR5kGWo";

  const prenom = document.getElementById("prenom").value;
  const nom = document.getElementById("nom").value;
  const email = document.getElementById("email").value;
  const age = document.getElementById("age").value;
  const jeu = document.getElementById("jeu").value;
  const experience = document.getElementById("experience").value;
  const motivation = document.getElementById("motivation").value;

  if(!prenom || !nom || !email || !age || !experience || !motivation){
    alert("Remplis tous les champs !");
    return;
  }

  fetch(webhook,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      content:`📩 Nouvelle candidature NSK Esport

👤 ${prenom} ${nom}
📧 ${email}
🎂 ${age}
🎮 ${jeu}
⏱ ${experience}
💬 ${motivation}`
    })
  });

  alert("Candidature envoyée !");
}
</script>

</body>
</html>
