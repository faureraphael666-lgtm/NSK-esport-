<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Team eSport - Tournois Galaxie</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

h1 {
  text-align: center;
  margin-top: 20px;
  text-shadow: 0 0 10px #fff;
}

#tournaments {
  max-width: 700px;
  margin: 20px auto;
}

.tournament {
  background: rgba(0,0,30,0.7);
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 0 15px #00f;
}

button {
  margin: 5px 5px 5px 0;
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}

button.present { background: #0f0; color: #000; }
button.absent { background: #f00; color: #fff; }
button.incertain { background: #ff0; color: #000; }

.participants-list {
  margin-top: 10px;
  font-size: 14px;
}

.category-title {
  font-weight: bold;
  margin-top: 5px;
  text-decoration: underline;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<h1>Tournois de la Team</h1>
<div id="tournaments"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ===== Demander le pseudo UNE seule fois =====
let playerPseudo = localStorage.getItem("playerPseudo");
if(!playerPseudo){
  playerPseudo = prompt("Bienvenue ! Entre ton pseudo :");
  if(!playerPseudo) playerPseudo = "Anonyme";
  localStorage.setItem("playerPseudo", playerPseudo);
}

// ===== Tournois prédéfinis =====
const tournaments = [
  { id: 1, name: "Tournoi Valorant", game: "Valorant", date: "2026-04-01", participants: {present: [], absent: [], incertain: []} },
  { id: 2, name: "Tournoi Rocket League", game: "Rocket League", date: "2026-04-05", participants: {present: [], absent: [], incertain: []} },
  { id: 3, name: "Tournoi Fortnite", game: "Fortnite", date: "2026-04-10", participants: {present: [], absent: [], incertain: []} }
];

const container = document.getElementById("tournaments");

function render() {
  container.innerHTML = "";
  tournaments.forEach(t => {
    const html = document.createElement("div");
    html.className = "tournament";
    html.innerHTML = `
      <strong>${t.name}</strong> - ${t.game} - ${t.date}<br>
      <button class="present" onclick="setPresence(${t.id}, 'present')">✅ Je participe</button>
      <button class="absent" onclick="setPresence(${t.id}, 'absent')">❌ Je ne peux pas</button>
      <button class="incertain" onclick="setPresence(${t.id}, 'incertain')">❓ Incertain</button>
      <div class="participants-list" id="participants-${t.id}">${renderParticipants(t.participants)}</div>
    `;
    container.appendChild(html);
  });
}

function renderParticipants(participants) {
  let html = "";
  if(participants.present.length > 0){
    html += `<div class="category-title">Présents:</div>` + participants.present.join(", ") + "<br>";
  }
  if(participants.absent.length > 0){
    html += `<div class="category-title">Absents:</div>` + participants.absent.join(", ") + "<br>";
  }
  if(participants.incertain.length > 0){
    html += `<div class="category-title">Incertain:</div>` + participants.incertain.join(", ") + "<br>";
  }
  return html;
}

window.setPresence = function(id, category){
  const t = tournaments.find(t => t.id === id);

  // Supprimer le pseudo des autres catégories
  ["present","absent","incertain"].forEach(cat=>{
    const index = t.participants[cat].indexOf(playerPseudo);
    if(index > -1) t.participants[cat].splice(index,1);
  });

  // Ajouter le pseudo dans la catégorie choisie
  t.participants[category].push(playerPseudo);

  document.getElementById(`participants-${id}`).innerHTML = renderParticipants(t.participants);
}

render();

// ===== Fond galaxie avec étoiles =====
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let shootingStars = [];
for(let i=0;i<200;i++){
  stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: Math.random()*1.2, alpha: Math.random() });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fill();
  });

  if(Math.random()<0.02){
    shootingStars.push({ x: Math.random()*canvas.width, y: 0, length: Math.random()*200+100, speed: Math.random()*10+6 });
  }

  shootingStars.forEach((star,i)=>{
    ctx.beginPath();
    ctx.moveTo(star.x,star.y);
    ctx.lineTo(star.x-star.length, star.y+star.length);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();
    star.x += star.speed;
    star.y += star.speed;
    if(star.x>canvas.width || star.y>canvas.height){ shootingStars.splice(i,1); }
  });

  requestAnimationFrame(drawStars);
}

drawStars();

window.addEventListener('resize', ()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });

});
</script>

</body>
</html>
