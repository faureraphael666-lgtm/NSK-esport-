<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM TOXIC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* ☢️ BACKGROUND */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:
radial-gradient(circle at 30% 30%, rgba(0,255,120,0.15), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(0,255,100,0.12), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(0,255,80,0.1), transparent 40%);
animation:liquid 12s infinite linear;
z-index:-1;
filter:blur(60px);
}

@keyframes liquid{
0%{transform:rotate(0deg);}
50%{transform:rotate(180deg);}
100%{transform:rotate(360deg);}
}

.hero{
height:40vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.glitch{
font-size:50px;
color:#00ff88;
text-shadow:0 0 10px #00ff88;
}

.system{text-align:center;padding:20px;}

input{
padding:10px;
border:none;
border-radius:10px;
margin:5px;
text-align:center;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}

.present{background:#00ff88;}
.absent{background:#ff0033;color:white;}
.admin{background:gold;display:none;}
.login-btn{background:#00cc66;}

.list-box{
background:#111;
padding:15px;
border-radius:10px;
margin:10px;
display:inline-block;
}

/* POPUP */
#popup,#tournoiPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#111;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px #00ff88;
}

</style>
</head>

<body>

<section class="hero">
<h1 class="glitch">☣️ TEAM TOXIC ☣️</h1>
<p>Système de présence</p>
</section>

<section class="system">

<input type="text" id="pseudo" placeholder="Pseudo"><br>

<button class="present" onclick="setPresence(true)">Présent</button>
<button class="absent" onclick="setPresence(false)">Absent</button><br>

<button class="login-btn" onclick="openLogin()">Connexion Admin</button>

<div>
<button class="admin" onclick="openTournoi()">Créer tournoi</button>
<button class="admin" onclick="editTournament()">Modifier tournoi</button>
<button class="admin" onclick="deleteTournament()">Supprimer tournoi</button>
<button class="admin" onclick="removePlayer()">Supprimer joueur</button>
</div>

<div id="tournamentDisplay"></div>

<div class="list-box">
<h3>🟢 Présents</h3>
<ul id="presentList"></ul>
</div>

<div class="list-box">
<h3>🔴 Absents</h3>
<ul id="absentList"></ul>
</div>

</section>

<!-- LOGIN -->
<div id="popup">
<div class="popup-box">
<h3>Connexion Admin</h3>
<input id="adminId" placeholder="Identifiant"><br>
<input id="adminPass" type="password" placeholder="Mot de passe"><br>
<button onclick="loginAdmin()">Valider</button>
</div>
</div>

<!-- TOURNOI FORM -->
<div id="tournoiPopup">
<div class="popup-box">
<h3>Créer Tournoi</h3>
<input id="tName" placeholder="Nom du tournoi"><br>
<input id="tDate" type="date"><br>
<input id="tTime" type="time"><br>
<input id="tPlayers" type="number" placeholder="Joueurs max"><br>
<button onclick="saveTournament()">Valider</button>
</div>
</div>

<script>

// DATA
let presentPlayers=JSON.parse(localStorage.getItem("present"))||[];
let absentPlayers=JSON.parse(localStorage.getItem("absent"))||[];
let tournament=JSON.parse(localStorage.getItem("tournament"))||null;

// RENDER
function render(){
let pList=document.getElementById("presentList");
let aList=document.getElementById("absentList");
let tDiv=document.getElementById("tournamentDisplay");

pList.innerHTML=""; aList.innerHTML=""; tDiv.innerHTML="";

presentPlayers.forEach(p=>pList.innerHTML+=`<li>${p}</li>`);
absentPlayers.forEach(p=>aList.innerHTML+=`<li>${p}</li>`);

if(tournament){
tDiv.innerHTML=`
<div class="list-box">
<h3>🏆 ${tournament.name}</h3>
<p>📅 ${tournament.date}</p>
<p>⏰ ${tournament.time}</p>
<p>👥 ${tournament.players} joueurs max</p>
</div>`;
}
}

// SAVE
function save(){
localStorage.setItem("present",JSON.stringify(presentPlayers));
localStorage.setItem("absent",JSON.stringify(absentPlayers));
localStorage.setItem("tournament",JSON.stringify(tournament));
}

// PRESENCE
function setPresence(state){
let p=document.getElementById("pseudo").value;
if(!p)return alert("Pseudo ?");
presentPlayers=presentPlayers.filter(x=>x!==p);
absentPlayers=absentPlayers.filter(x=>x!==p);
state?presentPlayers.push(p):absentPlayers.push(p);
save(); render();
}

// ADMIN
const ADMIN_ID="230851";
const ADMIN_PASS="test.test";

function loginAdmin(){
if(adminId.value===ADMIN_ID && adminPass.value===ADMIN_PASS){
document.querySelectorAll(".admin").forEach(b=>b.style.display="inline-block");
popup.style.display="none";
}
}

// POPUPS
function openLogin(){popup.style.display="flex";}
function openTournoi(){tournoiPopup.style.display="flex";}

// TOURNOI
function saveTournament(){
tournament={
name:tName.value,
date:tDate.value,
time:tTime.value,
players:tPlayers.value
};
save(); render();
tournoiPopup.style.display="none";
}

function editTournament(){
if(!tournament)return alert("Aucun tournoi");
openTournoi();
tName.value=tournament.name;
tDate.value=tournament.date;
tTime.value=tournament.time;
tPlayers.value=tournament.players;
}

function deleteTournament(){
if(confirm("Supprimer ?")){
tournament=null; save(); render();
}
}

// REMOVE PLAYER
function removePlayer(){
let name=prompt("Pseudo ?");
presentPlayers=presentPlayers.filter(p=>p!==name);
absentPlayers=absentPlayers.filter(p=>p!==name);
save(); render();
}

// INIT
render();

</script>

</body>
</html>
